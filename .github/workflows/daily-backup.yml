# 每日从 shitjournal.org 抓取文章并备份到本仓库
name: Daily ShitJournal Backup

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持在 Actions 页手动运行

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run crawler
        run: python crawler.py crawl --news-only

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup/
          git diff --staged --quiet || (git commit -m "chore(backup): daily shitjournal backup [automated]" && git push)
